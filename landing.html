<!DOCTYPE html>
<html>
<head>
    <title>AI Generator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #ddd;
        }

        .btn {
            padding: 12px 30px;
            margin: 10px;
            font-size: 16px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .login {
            background: #00c6ff;
            color: white;
        }

        .signup {
            background: #ff512f;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎤 AI Notes Generator</h1>
    <p>Convert your speech into smart notes with timestamps and summary</p>

    <a href="/login">
        <button class="btn login">Login</button>
    </a>

    <a href="/signup">
        <button class="btn signup">Signup</button>
    </a>
</div>

</body>
</html>
